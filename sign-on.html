
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Native JS Authentication</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 3rem auto; padding: 0 1rem; color: #1f2937; }
    .auth-container { display: flex; flex-direction: column; gap: 1rem; align-items: flex-start; margin-top: 1.5rem; }
    .btn { padding: 10px 20px; font-size: 1rem; font-weight: 600; border-radius: 6px; cursor: pointer; border: none; }
    .fb-btn { background-color: #1877f2; color: white; }
    .logout-btn { background-color: #ef4444; color: white; display: none; }
    #profile-card { margin-top: 2rem; padding: 1.5rem; border: 1px solid #e5e7eb; border-radius: 8px; background: #f9fafb; display: none; }
  </style>

  <!-- 1. Load native Google Identity Services client library -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  <!-- 2. Load native Meta (Facebook) JS SDK -->
  <script async defer src="https://connect.facebook.net/en_US/sdk.js"></script>
</head>
<body>

  <h1>Sign In</h1>
  
  <div id="auth-buttons" class="auth-container">
    <!-- Google renders its own highly optimized, secure button container -->
    <div id="google-button-container"></div>
    
    <!-- Custom button triggers the Facebook SDK popup -->
    <button id="fb-login-btn" class="btn fb-btn">Sign in with Facebook</button>
  </div>

  <button id="logout-btn" class="btn logout-btn">Log Out</button>

  <div id="profile-card">
    <p><strong>Authenticated via:</strong> <span id="auth-provider"></span></p>
    <h3 id="user-name" style="margin: 0.5rem 0;"></h3>
    <p id="user-email" style="margin: 0; color: #4b5563;"></p>
  </div>

  <script>
    // --- CONFIGURATION ---
    const GOOGLE_CLIENT_ID = '1033419980868-bl498acmpla2fdg58nnl56kecv0gfsd3.apps.googleusercontent.com';
    const FACEBOOK_APP_ID = 'YOUR_FACEBOOK_APP_ID';

    // --- DOM REFERENCES ---
    const authButtons = document.getElementById('auth-buttons');
    const logoutBtn = document.getElementById('logout-btn');
    const profileCard = document.getElementById('profile-card');
    const authProviderSpan = document.getElementById('auth-provider');
    const userNameEl = document.getElementById('user-name');
    const userEmailEl = document.getElementById('user-email');

    // ==========================================
    // GOOGLE IDENTITY SERVICES IMPLEMENTATION
    // ==========================================
    
    // Triggered automatically by GIS library when the script loads
    window.onload = function () {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleResponse
      });

      // Render the official Google sign-in button natively
      google.accounts.id.renderButton(
        document.getElementById("google-button-container"),
        { theme: "outline", size: "large", type: "standard" }
      );
    };

    // Google returns a Base64-encoded JWT ID Token
    function handleGoogleResponse(response) {
      const jwtPayload = decodeJwt(response.credential);
      updateUI(jwtPayload.name, jwtPayload.email, 'Google');
    }

     function handleSilentResponse(response) {
       try 
      let jwtPayload = decodeJwt(response.credential);
      console.log("User email is" : jwtPayload.email);
       catch(e) {
        console.error(e);
       }
    }

    // Pure JS helper to decode base64url JWT payloads without external modules
    function decodeJwt(token) {
      const base64Url = token.split('.')[1];
      const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
      const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(c => {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
      }).join(''));
      return JSON.parse(jsonPayload);
    }


    // ==========================================
    // FACEBOOK JS SDK IMPLEMENTATION
    // ==========================================
    
    // Triggered automatically when the Facebook SDK finishes loading
    window.fbAsyncInit = function() {
      FB.init({
        appId      : FACEBOOK_APP_ID,
        cookie     : true,  // Enables cookies so the client session state persists
        xfbml      : false, // Set to true only if using embedded Facebook social plugins
        version    : 'v19.0'
      });
    };

    document.getElementById('fb-login-btn').addEventListener('click', () => {
      // Trigger native client popup handshake
      FB.login(response => {
        if (response.authResponse) {
          // Access token granted; query Graph API for minimal public info
          FB.api('/me', { fields: 'name,email' }, profile => {
            updateUI(profile.name, profile.email || 'No email shared', 'Facebook');
          });
        } else {
          console.warn('Facebook login cancelled or unauthorized.');
        }
      }, { scope: 'public_profile,email' });
    });


    // ==========================================
    // STATE & UI MANAGEMENT
    // ==========================================
    
    function updateUI(name, email, provider) {
      authButtons.style.display = 'none';
      logoutBtn.style.display = 'inline-block';
      profileCard.style.display = 'block';
      
      authProviderSpan.textContent = provider;
      userNameEl.textContent = name;
      userEmailEl.textContent = email;
    }

    logoutBtn.addEventListener('click', () => {
      // Clear Google One-Tap/Auto-select sessions locally
      if (typeof google !== 'undefined') {
        google.accounts.id.disableAutoSelect();
      }
      
      // Attempt to clear active Facebook application authorization state
      if (typeof FB !== 'undefined') {
        FB.getLoginStatus(response => {
          if (response.status === 'connected') {
            FB.logout();
          }
        });
      }

      // Reset client interface
      authButtons.style.display = 'flex';
      logoutBtn.style.display = 'none';
      profileCard.style.display = 'none';
    });
  </script>
</body>
</html>
